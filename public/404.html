<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      (function () {
        const pathSegmentsToKeep = 1;
        const locationData = window.location;
        const basePath = locationData.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/");
        const routePath = locationData.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/");
        const query = locationData.search
          ? "&" + locationData.search.slice(1).replace(/&/g, "~and~")
          : "";
        const target =
          locationData.protocol +
          "//" +
          locationData.hostname +
          (locationData.port ? ":" + locationData.port : "") +
          basePath +
          "/?/" +
          routePath.replace(/&/g, "~and~") +
          query +
          locationData.hash;

        window.location.replace(target);
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body></body>
</html>
